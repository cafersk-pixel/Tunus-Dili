const list = document.getElementById('wordList');

function render(data) {
  list.innerHTML = data.map(k => `
    <tr>
      <td>${k.n}</td>
      <td><b>${k.t}</b></td>
      <td>${k.a}</td>
      <td><small>${k.o}</small></td>
      <td><button class="play-btn" onclick="speak('${k.y}','${k.a}')">▶</button></td>
    </tr>
  `).join('');
}

function speak(t, a) {
  speechSynthesis.cancel();
  let m1 = new SpeechSynthesisUtterance(t);
  m1.lang = 'tr-TR'; m1.rate = 0.8;
  let m2 = new SpeechSynthesisUtterance(a);
  m2.lang = 'tr-TR';
  speechSynthesis.speak(m1);
  m1.onend = () => setTimeout(() => speechSynthesis.speak(m2), 500);
}

function search() {
  let q = document.getElementById('searchInput').value.toLowerCase();
  render(K.filter(k => k.t.toLowerCase().includes(q) || k.a.toLowerCase().includes(q)));
}

render(K);
